<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리가 카운터</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f0;
      --surface: #ffffff;
      --border: #e2ddd6;
      --text-primary: #1a1814;
      --text-secondary: #7a746a;
      --accent: #2a2420;
      --chip-bg: #edeae4;
      --btn-hover: #edeae4;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--text-secondary);
      text-transform: none;
    }

    .count-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-bottom: 2rem;
    }

    .count-label {
      font-size: 12px;
      color: var(--text-secondary);
      letter-spacing: 0.1em;
    }

    .count-number {
      font-size: 100px;
      font-weight: 700;
      line-height: 1;
      color: var(--text-primary);
      transition: transform 0.1s cubic-bezier(.22,1.5,.36,1);
      display: block;
    }

    .count-number.bump {
      transform: scale(1.18);
    }

    .btn-main {
      width: 190px;
      height: 190px;
      border-radius: 50%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: background 0.12s, transform 0.08s, box-shadow 0.12s;
      user-select: none;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      margin-bottom: 1.5rem;
    }

    .btn-main:hover {
      background: var(--btn-hover);
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .btn-main:active {
      transform: scale(0.94);
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }

    .btn-word {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .btn-hint {
      font-size: 12px;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
    }

    .streak {
      font-size: 13px;
      color: var(--text-secondary);
      min-height: 20px;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .streak strong {
      color: var(--text-primary);
      font-weight: 500;
    }

    .history-section {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.2rem 1.4rem;
      margin-bottom: 1.2rem;
    }

    .history-title {
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 28px;
    }

    .chip {
      padding: 3px 11px;
      border-radius: 999px;
      background: var(--chip-bg);
      font-size: 12px;
      color: var(--text-secondary);
      animation: popin 0.18s cubic-bezier(.22,1.5,.36,1);
    }

    @keyframes popin {
      from { opacity: 0; transform: scale(0.6); }
      to   { opacity: 1; transform: scale(1); }
    }

    .footer {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .reset-btn {
      font-size: 12px;
      color: var(--text-secondary);
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      text-decoration: underline;
      padding: 0;
    }

    .reset-btn:hover { color: var(--text-primary); }

    .key-hint {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .key-hint kbd {
      font-family: inherit;
      background: var(--chip-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 11px;
    }
  </style>
</head>
<body>

<header>
  <h1>우리가 카운터</h1>
</header>

<div class="count-section">
  <span class="count-label">오늘 "우리가" 횟수</span>
  <span class="count-number" id="num">0</span>
</div>

<button class="btn-main" id="mainBtn" onclick="increment()">
  <span class="btn-word">우리가</span>
  <span class="btn-hint">탭하기</span>
</button>

<div class="streak" id="streakMsg"></div>

<div class="history-section">
  <div class="history-title">타임라인</div>
  <div class="history-list" id="history"></div>
</div>

<div class="footer">
  <span class="key-hint"><kbd>Space</kbd> 또는 <kbd>Enter</kbd>로도 카운트</span>
  <button class="reset-btn" onclick="resetAll()">초기화</button>
</div>

<script>
  let count = 0;
  const reactions = ["", "또!", "진짜 또?", "ㅋㅋ", "클래식", "역시", "예상함", "레전드", "모이고 있어", "100개 가즈아"];

  function getTime() {
    const d = new Date();
    return [d.getHours(), d.getMinutes(), d.getSeconds()]
      .map(n => String(n).padStart(2, '0')).join(':');
  }

  function increment() {
    count++;
    const numEl = document.getElementById('num');
    numEl.textContent = count;
    numEl.classList.remove('bump');
    void numEl.offsetWidth;
    numEl.classList.add('bump');
    setTimeout(() => numEl.classList.remove('bump'), 160);

    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = '#' + count + '  ' + getTime();
    document.getElementById('history').prepend(chip);

    const s = document.getElementById('streakMsg');
    if (count === 10)  s.innerHTML = '<strong>10회 달성!</strong> 🎉';
    else if (count === 30)  s.innerHTML = '<strong>30회!</strong> 강의가 끝날 것 같다...';
    else if (count === 50)  s.innerHTML = '<strong>50회!</strong> 강사님 최고...';
    else if (count === 100) s.innerHTML = '<strong>100회!</strong> 전설의 강의';
    else {
      const idx = Math.min(count, reactions.length - 1);
      s.innerHTML = reactions[idx] ? reactions[idx] : '<strong>' + count + '번째</strong> "우리가"';
    }
  }

  function resetAll() {
    if (!confirm('카운터를 초기화할까요?')) return;
    count = 0;
    document.getElementById('num').textContent = '0';
    document.getElementById('history').innerHTML = '';
    document.getElementById('streakMsg').textContent = '';
  }

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      increment();
    }
  });
</script>
</body>
</html>
